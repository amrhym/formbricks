trigger:
  batch: false
  branches:
    include:
      - hivecfm-main

pool:
  name: hivecfm-build

variables:
  dockerRegistryServiceConnection: hivecfm-acr
  containerRegistry: hivecfmregistry.azurecr.io
  tag: $(Build.BuildId)
  DOCKER_BUILDKIT: 1

stages:
- stage: Build
  displayName: Build and Push Images
  jobs:
  - job: BuildCore
    displayName: Build hivecfm-core
    steps:
    - task: Docker@2
      displayName: Login to ACR
      inputs:
        command: login
        containerRegistry: $(dockerRegistryServiceConnection)

    - script: |
        mkdir -p /tmp/docker-secrets
        echo "postgresql://build:build@localhost:5432/build" > /tmp/docker-secrets/database_url
        echo "build-time-placeholder-key-32chars!!" > /tmp/docker-secrets/encryption_key
        echo "redis://localhost:6379" > /tmp/docker-secrets/redis_url
        echo "" > /tmp/docker-secrets/sentry_auth_token

        docker build \
          -f apps/web/Dockerfile \
          --build-arg NODE_OPTIONS="--max_old_space_size=8192" \
          --secret id=database_url,src=/tmp/docker-secrets/database_url \
          --secret id=encryption_key,src=/tmp/docker-secrets/encryption_key \
          --secret id=redis_url,src=/tmp/docker-secrets/redis_url \
          --secret id=sentry_auth_token,src=/tmp/docker-secrets/sentry_auth_token \
          -t $(containerRegistry)/hivecfm-core:$(tag) \
          -t $(containerRegistry)/hivecfm-core:latest \
          $(Build.SourcesDirectory)

        rm -rf /tmp/docker-secrets
      displayName: Build hivecfm-core

    - script: |
        docker push $(containerRegistry)/hivecfm-core:$(tag)
        docker push $(containerRegistry)/hivecfm-core:latest
      displayName: Push hivecfm-core

  - job: BuildLicensePortal
    displayName: Build license-portal
    steps:
    - task: Docker@2
      displayName: Build and push license-portal
      inputs:
        command: buildAndPush
        repository: hivecfm-license-portal
        dockerfile: apps/license-portal/Dockerfile
        buildContext: $(Build.SourcesDirectory)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

- stage: Deploy
  displayName: Deploy to Container Apps
  dependsOn: Build
  jobs:
  - job: DeployCore
    displayName: Deploy hivecfm-core
    steps:
    - script: |
        az login --identity
        az containerapp update \
          --name hivecfm-core \
          --resource-group rg-hivecfm \
          --image $(containerRegistry)/hivecfm-core:$(tag)
      displayName: Deploy hivecfm-core

  - job: DeployLicensePortal
    displayName: Deploy license-portal
    steps:
    - script: |
        az login --identity
        az containerapp update \
          --name license-portal \
          --resource-group rg-hivecfm \
          --image $(containerRegistry)/hivecfm-license-portal:$(tag)
      displayName: Deploy license-portal
