# HiveCFM nginx Initial Configuration
# Use this BEFORE running certbot
# After certbot: Replace with hivecfm.conf

# Upstream definitions for Docker services
upstream hivecfm_core {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream hivecfm_metabase {
    server 127.0.0.1:3001;
    keepalive 32;
}

# HTTP Server - for certbot ACME challenge
server {
    listen 80;
    listen [::]:80;
    server_name hivecfm.xcai.io;

    root /var/www/html;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Proxy to HiveCFM (before SSL is configured)
    location / {
        proxy_pass http://hivecfm_core;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
