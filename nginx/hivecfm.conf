# HiveCFM nginx Configuration
# Production Reverse Proxy with SSL
#
# Installation:
#   1. Copy to /etc/nginx/sites-available/hivecfm
#   2. Create symlink: ln -s /etc/nginx/sites-available/hivecfm /etc/nginx/sites-enabled/
#   3. Remove default: rm /etc/nginx/sites-enabled/default
#   4. Test config: nginx -t
#   5. Run certbot: certbot --nginx -d hivecfm.xcai.io
#   6. Reload: systemctl reload nginx

# Upstream definitions for Docker services
upstream hivecfm_core {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream hivecfm_metabase {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream hivecfm_minio {
    server 127.0.0.1:9000;
    keepalive 32;
}

upstream hivecfm_superset {
    server 127.0.0.1:3002;
    keepalive 32;
}

upstream hivecfm_n8n {
    server 127.0.0.1:5678;
    keepalive 32;
}

upstream hivecfm_mock_salesforce {
    server 127.0.0.1:3003;
    keepalive 32;
}

# HTTP - Initial config for certbot (will be modified by certbot)
server {
    listen 80;
    listen [::]:80;
    server_name hivecfm.xcai.io salesforce.hivecfm.xcai.io;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other HTTP traffic to HTTPS (after certbot runs)
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Main Application (certbot will add SSL directives)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hivecfm.xcai.io;

    # SSL Configuration - managed by certbot
    ssl_certificate /etc/letsencrypt/live/hivecfm.xcai.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hivecfm.xcai.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # SSL Security Settings - most settings in /etc/letsencrypt/options-ssl-nginx.conf
    # Additional security: OCSP stapling for faster SSL handshake
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    # Note: X-XSS-Protection is deprecated in modern browsers (Chrome 78+, Firefox 70+)
    # Kept for legacy browser compatibility only
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Request size limits for file uploads
    client_max_body_size 100M;

    # MinIO S3 Storage - for file uploads and previews
    # Handles both S3 API requests and direct file access
    location /storage/ {
        rewrite ^/storage/(.*) /$1 break;
        proxy_pass http://hivecfm_minio;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_request_buffering off;
        # Allow large file uploads
        client_max_body_size 100M;
    }

    # HiveCFM Core Application
    location / {
        proxy_pass http://hivecfm_core;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint (for external monitoring)
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

